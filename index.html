<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الإلكتروني</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400,500,600,700,800&family=Playfair+Display:wght@400,500,600,700,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="menu.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            background-color: #000;
            font-family: 'Playfair Display', serif;
        }

        /* خلفية الصفحة */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 0;
            background-color: #d3b18b;
        }

        /* المحتوى الرئيسي */
        .main-content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
        }

        /* شريط التنقل العلوي */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 5%;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            width: 150px;
            height: auto;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* قسم المنتجات */
        .products-section {
            position: relative;
            z-index: 10;
            padding: 150px 5% 80px 5%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px 40px;
            max-width: 1000px;
            width: 100%;
        }

        .product-card {
            background: transparent;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-10px);
        }

        .product-image-container {
            width: 100%;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .product-image-container img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .product-name {
            font-size: 28px;
            font-weight: 700;
            color: #3d2f1f;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Cinzel', serif;
        }

        .explore-btn {
            display: inline-block;
            padding: 14px 35px;
            background-color: #3d2f1f;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            border: 2px solid #3d2f1f;
            font-family: 'Cinzel', serif;
        }

        .explore-btn:hover {
            background-color: transparent;
            color: #3d2f1f;
        }

        /* الفوتر */
        .footer-container {
            position: relative;
            bottom: 0;
            left: 0;
            width: 100%;
            height: auto;
            min-height: 150px;
            z-index: 1000;
            margin-top: 80px;
        }

        .footer-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* تصميم متجاوب إضافي */
        @media (max-width: 1024px) {
            .products-grid {
                gap: 50px 30px;
                max-width: 800px;
            }

            .product-image-container {
                height: 300px;
            }

            .product-name {
                font-size: 24px;
            }
        }

        @media (max-width: 768px) {
            .logo-container {
                width: 120px;
            }
            
            .navbar {
                padding: 20px 5%;
            }

            .products-section {
                padding: 120px 5% 60px 5%;
            }

            .products-grid {
                gap: 40px 20px;
                max-width: 600px;
            }

            .product-image-container {
                height: 250px;
            }

            .product-name {
                font-size: 20px;
                margin-bottom: 15px;
            }

            .explore-btn {
                padding: 12px 28px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .products-grid {
                gap: 35px 15px;
            }

            .product-image-container {
                height: 200px;
            }

            .product-name {
                font-size: 18px;
            }

            .explore-btn {
                padding: 10px 24px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <!-- الخلفية -->
    <div class="background-container"></div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <!-- شريط التنقل -->
        <nav class="navbar">
            <div class="logo-container">
                <img src="L11.png" alt="Logo">
            </div>
            <div class="menu-icon" id="menuIcon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>

        <!-- قائمة المنيو -->
        <div class="menu-overlay" id="menuOverlay">
            <!-- هيدر المنيو -->
            <div class="menu-header">
                <div class="menu-close" id="menuClose"></div>
                <div class="menu-logo">
                    <img src="L11.png" alt="Logo">
                </div>
            </div>

            <div class="menu-content">
                <!-- القسم الرئيسي -->
                <div class="menu-section">
                    <ul class="menu-list">
                        <li><a href="#home">Home</a></li>
                        <li><a href="#products">Products</a></li>
                        <li><a href="#cart">Shopping Cart</a></li>
                    </ul>
                </div>

                <div class="menu-divider"></div>

                <!-- القسم الثانوي -->
                <div class="menu-section secondary">
                    <ul class="menu-list">
                        <li><a href="#privacy">Privacy Policy</a></li>
                        <li><a href="#returns">Return Policy</a></li>
                        <li><a href="#about">About Store</a></li>
                    </ul>
                </div>

                <div class="menu-divider"></div>

                <!-- قسم الحساب -->
                <div class="menu-section account">
                    <ul class="menu-list">
                        <li><a href="#account">My Account</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- قسم المنتجات -->
        <section class="products-section">
            <div class="products-grid">
                <!-- المنتج الأول -->
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="P1.png" alt="Hattan 1">
                    </div>
                    <h3 class="product-name">HATTAN 1</h3>
                    <a href="javascript:void(0)" class="explore-btn">EXPLORE MORE</a>
                </div>

                <!-- المنتج الثاني -->
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="P2.png" alt="Hattan 2">
                    </div>
                    <h3 class="product-name">HATTAN 2</h3>
                    <a href="javascript:void(0)" class="explore-btn">EXPLORE MORE</a>
                </div>

                <!-- المنتج الثالث -->
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="P3.png" alt="Ghada">
                    </div>
                    <h3 class="product-name">GHADA</h3>
                    <a href="javascript:void(0)" class="explore-btn">EXPLORE MORE</a>
                </div>

                <!-- المنتج الرابع -->
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="P4.png" alt="Bareq">
                    </div>
                    <h3 class="product-name">BAREQ</h3>
                    <a href="javascript:void(0)" class="explore-btn">EXPLORE MORE</a>
                </div>
            </div>
        </section>

        <!-- الفوتر -->
        <footer class="footer-container">
            <img src="F1.png" alt="Footer">
        </footer>
    </div>

    <script src="menu.js"></script>
</body>
</html>
