<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Ramla Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400,600,700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Crimson Text', serif !important;
        }

        body {
            overflow-x: hidden;
            background-color: #000;
            font-family: 'Crimson Text', serif !important;
        }
        
        body * {
            font-family: 'Crimson Text', serif !important;
        }

        /* خلفية الصفحة */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 0;
            background-color: #d3b18b;
        }

        /* المحتوى الرئيسي */
        .main-content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
        }

        /* شريط التنقل العلوي */
        .navbar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 5%;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container {
            width: 150px;
            height: auto;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* أيقونة المنيو على اليسار */
        .menu-icon {
            position: absolute;
            left: 5%;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 2000;
            transition: all 0.3s ease;
        }

        .menu-icon span {
            width: 35px;
            height: 3px;
            background: linear-gradient(135deg, #8b6f47, #d4a574);
            border-radius: 3px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .menu-icon:hover span {
            background: linear-gradient(135deg, #d4a574, #8b6f47);
        }

        .menu-icon.active span:nth-child(1) {
            transform: rotate(45deg) translate(10px, 10px);
            background: #3d2f1f;
        }

        .menu-icon.active span:nth-child(2) {
            opacity: 0;
            transform: translateX(20px);
        }

        .menu-icon.active span:nth-child(3) {
            transform: rotate(-45deg) translate(10px, -10px);
            background: #3d2f1f;
        }

        /* قائمة المنيو - يطلع من النص */
        .menu-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90%;
            max-width: 500px;
            height: auto;
            max-height: 85vh;
            background: linear-gradient(135deg, #c9a876 0%, #d3b18b 100%);
            z-index: 1500;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            opacity: 0;
        }

        .menu-overlay.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        /* تأثير الخلفية الداكنة */
        .menu-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1400;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
        }

        .menu-backdrop.active {
            opacity: 1;
            visibility: visible;
        }

        /* تأثير الزخرفة في المنيو */
        .menu-overlay::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(139, 111, 71, 0.15) 0%, transparent 50%);
            pointer-events: none;
            border-radius: 10px;
        }

        /* هيدر المنيو - ثابت في الأعلى */
        .menu-header {
            position: sticky;
            top: 0;
            width: 100%;
            padding: 25px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            background: linear-gradient(135deg, #c9a876 0%, #d3b18b 100%);
            border-radius: 10px 10px 0 0;
            flex-shrink: 0;
        }

        .menu-logo {
            width: 120px;
        }

        .menu-logo img {
            width: 100%;
            height: auto;
            display: block;
        }

        .menu-close {
            position: absolute;
            left: 25px;
            cursor: pointer;
            width: 35px;
            height: 35px;
            transition: transform 0.3s ease;
        }

        .menu-close:hover {
            transform: rotate(90deg);
        }

        .menu-close::before,
        .menu-close::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 25px;
            height: 2px;
            background-color: #2d1f0f;
            border-radius: 2px;
        }

        .menu-close::before {
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .menu-close::after {
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        .menu-content {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            padding: 40px 30px;
        }

        .menu-section {
            margin-bottom: 30px;
        }

        .menu-section:last-child {
            margin-bottom: 0;
        }

        .menu-list {
            list-style: none;
            padding: 0;
        }

        .menu-list li {
            margin: 14px 0;
        }

        /* حجم موحد لكل الأقسام */
        .menu-list a {
            color: #2d1f0f;
            text-decoration: none;
            font-size: 18px !important;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            position: relative;
            display: inline-block;
            padding: 6px 0;
            transition: all 0.3s ease;
            font-family: 'Crimson Text', serif !important;
        }

        .menu-list a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: #2d1f0f;
            transform: translateX(-50%);
            transition: width 0.3s ease;
        }

        .menu-list a:hover::after {
            width: 100%;
        }

        .menu-list a:hover {
            color: #1a0f05;
            letter-spacing: 3.5px;
        }

        .menu-divider {
            width: 70px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8b6f47, transparent);
            margin: 25px auto;
            position: relative;
        }

        /* شعار زخرفي */
        .menu-divider::before,
        .menu-divider::after {
            content: '◆';
            position: absolute;
            color: #8b6f47;
            font-size: 7px;
            top: 50%;
            transform: translateY(-50%);
        }

        .menu-divider::before {
            left: -12px;
        }

        .menu-divider::after {
            right: -12px;
        }

        /* نفس الحجم لجميع الأقسام */
        .menu-section.secondary .menu-list a,
        .menu-section.account .menu-list a {
            font-size: 18px;
            letter-spacing: 2.5px;
        }

        /* قسم المنتجات */
        .products-section {
            position: relative;
            z-index: 10;
            padding: 150px 5% 80px 5%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px 40px;
            max-width: 1000px;
            width: 100%;
        }

        .product-card {
            background: transparent;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-10px);
        }

        .product-image-container {
            width: 100%;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .product-image-container img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .product-name {
            font-size: 28px;
            font-weight: 700;
            color: #3d2f1f;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: 'Crimson Text', serif !important;
        }

        .explore-btn {
            display: inline-block;
            padding: 14px 35px;
            background-color: #3d2f1f;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            border: 2px solid #3d2f1f;
            font-family: 'Crimson Text', serif !important;
            text-transform: uppercase;
        }

        .explore-btn:hover {
            background-color: transparent;
            color: #3d2f1f;
        }

        /* الفوتر */
        .footer-container {
            position: relative;
            bottom: 0;
            left: 0;
            width: 100%;
            height: auto;
            z-index: 1000;
            margin-top: 80px;
            display: block;
            line-height: 0;
        }

        .footer-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* تصميم متجاوب إضافي */
        @media (max-width: 1024px) {
            .products-grid {
                gap: 50px 30px;
                max-width: 800px;
            }

            .product-image-container {
                height: 300px;
            }

            .product-name {
                font-size: 24px;
            }
        }

        @media (max-width: 768px) {
            .logo-container {
                width: 120px;
            }
            
            .navbar {
                padding: 20px 5%;
            }

            .menu-icon span {
                width: 30px;
                height: 2.5px;
            }

            .menu-overlay {
                width: 90%;
                max-width: 400px;
                max-height: 80vh;
            }

            .menu-header {
                padding: 18px 20px;
            }

            .menu-logo {
                width: 90px;
            }

            .menu-close {
                width: 28px;
                height: 28px;
                left: 18px;
            }

            .menu-close::before,
            .menu-close::after {
                width: 18px;
            }

            .menu-content {
                padding: 30px 20px;
            }

            .menu-section {
                margin-bottom: 22px;
            }

            .menu-list li {
                margin: 10px 0;
            }

            /* حجم موحد للجوال */
            .menu-list a,
            .menu-section.secondary .menu-list a,
            .menu-section.account .menu-list a {
                font-size: 16px !important;
                letter-spacing: 2px !important;
                font-family: 'Crimson Text', serif !important;
            }

            .menu-divider {
                width: 55px;
                margin: 18px auto;
            }

            .menu-divider::before,
            .menu-divider::after {
                font-size: 6px;
                left: -10px;
            }

            .menu-divider::after {
                right: -10px;
                left: auto;
            }

            .products-section {
                padding: 120px 5% 60px 5%;
            }

            .products-grid {
                gap: 40px 20px;
                max-width: 600px;
            }

            .product-image-container {
                height: 250px;
            }

            .product-name {
                font-size: 20px;
                margin-bottom: 15px;
            }

            .explore-btn {
                padding: 12px 28px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .menu-overlay {
                width: 92%;
                max-width: 340px;
            }

            .menu-header {
                padding: 16px 18px;
            }

            .menu-logo {
                width: 80px;
            }

            .menu-close {
                width: 26px;
                height: 26px;
                left: 16px;
            }

            .menu-close::before,
            .menu-close::after {
                width: 16px;
            }

            .menu-content {
                padding: 25px 18px;
            }

            .menu-section {
                margin-bottom: 18px;
            }

            .menu-list li {
                margin: 8px 0;
            }

            /* حجم موحد للجوالات الصغيرة */
            .menu-list a,
            .menu-section.secondary .menu-list a,
            .menu-section.account .menu-list a {
                font-size: 15px !important;
                letter-spacing: 1.8px !important;
                padding: 5px 0;
                font-family: 'Crimson Text', serif !important;
            }

            .menu-divider {
                width: 50px;
                margin: 16px auto;
            }

            .products-grid {
                gap: 35px 15px;
            }

            .product-image-container {
                height: 200px;
            }

            .product-name {
                font-size: 18px;
            }

            .explore-btn {
                padding: 10px 24px;
                font-size: 11px;
            }
        }

        @media (max-width: 360px) {
            .menu-overlay {
                width: 95%;
            }

            .menu-logo {
                width: 70px;
            }

            .menu-content {
                padding: 20px 15px;
            }

            .menu-list li {
                margin: 7px 0;
            }

            /* حجم أصغر للشاشات الصغيرة جداً */
            .menu-list a,
            .menu-section.secondary .menu-list a,
            .menu-section.account .menu-list a {
                font-size: 14px !important;
                letter-spacing: 1.5px !important;
                font-family: 'Crimson Text', serif !important;
            }

            .menu-divider {
                width: 45px;
                margin: 14px auto;
            }
        }
    </style>
</head>
<body>
    <!-- الخلفية -->
    <div class="background-container"></div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <!-- شريط التنقل -->
        <nav class="navbar">
            <div class="logo-container">
                <img src="L11.png" alt="Logo">
            </div>
            <div class="menu-icon" id="menuIcon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>

        <!-- قائمة المنيو -->
        <div class="menu-backdrop" id="menuBackdrop"></div>
        <div class="menu-overlay" id="menuOverlay">
            <!-- هيدر المنيو -->
            <div class="menu-header">
                <div class="menu-logo">
                    <img src="L11.png" alt="Logo">
                </div>
                <div class="menu-close" id="menuClose"></div>
            </div>

            <div class="menu-content">
                <!-- القسم الرئيسي -->
                <div class="menu-section">
                    <ul class="menu-list">
                        <li><a href="#home">Home</a></li>
                        <li><a href="#products">Products</a></li>
                        <li><a href="#cart">Shopping Cart</a></li>
                    </ul>
                </div>

                <div class="menu-divider"></div>

                <!-- القسم الثانوي -->
                <div class="menu-section secondary">
                    <ul class="menu-list">
                        <li><a href="#privacy">Privacy Policy</a></li>
                        <li><a href="#returns">Return Policy</a></li>
                        <li><a href="#about">About Store</a></li>
                    </ul>
                </div>

                <div class="menu-divider"></div>

                <!-- قسم الحساب -->
                <div class="menu-section account">
                    <ul class="menu-list">
                        <li><a href="#account">My Account</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- قسم المنتجات -->
        <section class="products-section">
            <div class="products-grid">
                <!-- المنتج الأول -->
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="P1.png" alt="Hattan 1">
                    </div>
                    <h3 class="product-name">HATTAN 1</h3>
                    <a href="javascript:void(0)" class="explore-btn">EXPLORE MORE</a>
                </div>

                <!-- المنتج الثاني -->
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="P2.png" alt="Hattan 2">
                    </div>
                    <h3 class="product-name">HATTAN 2</h3>
                    <a href="javascript:void(0)" class="explore-btn">EXPLORE MORE</a>
                </div>

                <!-- المنتج الثالث -->
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="P3.png" alt="Ghada">
                    </div>
                    <h3 class="product-name">GHADA</h3>
                    <a href="javascript:void(0)" class="explore-btn">EXPLORE MORE</a>
                </div>

                <!-- المنتج الرابع -->
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="P4.png" alt="Bareq">
                    </div>
                    <h3 class="product-name">BAREQ</h3>
                    <a href="javascript:void(0)" class="explore-btn">EXPLORE MORE</a>
                </div>
            </div>
        </section>

        <!-- الفوتر -->
        <footer class="footer-container">
            <img src="F1.png" alt="Footer">
        </footer>
    </div>

    <script>
        // فتح وإغلاق المنيو
        const menuIcon = document.getElementById('menuIcon');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuClose = document.getElementById('menuClose');
        const menuBackdrop = document.getElementById('menuBackdrop');

        function toggleMenu() {
            menuIcon.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            menuBackdrop.classList.toggle('active');
            
            // منع السكرول عند فتح المنيو
            if (menuOverlay.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }

        // فتح المنيو من الأيقونة
        menuIcon.addEventListener('click', toggleMenu);

        // إغلاق المنيو من علامة X
        menuClose.addEventListener('click', function() {
            menuIcon.classList.remove('active');
            menuOverlay.classList.remove('active');
            menuBackdrop.classList.remove('active');
            document.body.style.overflow = 'auto';
        });

        // إغلاق المنيو عند الضغط على أي رابط
        const menuLinks = document.querySelectorAll('.menu-list a');
        menuLinks.forEach(link => {
            link.addEventListener('click', function() {
                menuIcon.classList.remove('active');
                menuOverlay.classList.remove('active');
                menuBackdrop.classList.remove('active');
                document.body.style.overflow = 'auto';
            });
        });

        // إغلاق المنيو عند الضغط على الخلفية الداكنة
        menuBackdrop.addEventListener('click', function() {
            menuIcon.classList.remove('active');
            menuOverlay.classList.remove('active');
            menuBackdrop.classList.remove('active');
            document.body.style.overflow = 'auto';
        });
    </script>
</body>
</html>
