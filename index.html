<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الإلكتروني</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400,500,600,700,800&family=Playfair+Display:wght@400,500,600,700,800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            background-color: #000;
            font-family: 'Playfair Display', serif;
        }

        /* خلفية الصفحة */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 0;
            background-color: #d3b18b;
        }

        /* المحتوى الرئيسي */
        .main-content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
        }

        /* شريط التنقل العلوي */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 5%;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container {
            width: 150px;
            height: auto;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* أيقونة المنيو على اليسار */
        .menu-icon {
            position: absolute;
            left: 5%;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 2000;
            transition: all 0.3s ease;
        }

        .menu-icon span {
            width: 35px;
            height: 3px;
            background: linear-gradient(135deg, #8b6f47, #d4a574);
            border-radius: 3px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .menu-icon:hover span {
            background: linear-gradient(135deg, #d4a574, #8b6f47);
        }

        .menu-icon.active span:nth-child(1) {
            transform: rotate(45deg) translate(10px, 10px);
            background: #3d2f1f;
        }

        .menu-icon.active span:nth-child(2) {
            opacity: 0;
            transform: translateX(20px);
        }

        .menu-icon.active span:nth-child(3) {
            transform: rotate(-45deg) translate(10px, -10px);
            background: #3d2f1f;
        }

        /* قائمة المنيو */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #d3b18b;
            z-index: 1500;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* تأثير الجزيئات في المنيو */
        .menu-overlay::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(139, 111, 71, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 111, 71, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(139, 111, 71, 0.08) 0%, transparent 50%);
            animation: float-particles 20s ease-in-out infinite;
        }

        @keyframes float-particles {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }

        /* هيدر المنيو */
        .menu-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .menu-logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
        }

        .menu-logo img {
            width: 100%;
            height: auto;
            display: block;
        }

        .menu-close {
            cursor: pointer;
            width: 40px;
            height: 40px;
            position: relative;
            transition: transform 0.3s ease;
            margin-right: auto;
        }

        .menu-close:hover {
            transform: rotate(90deg);
        }

        .menu-close::before,
        .menu-close::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 3px;
            background-color: #3d2f1f;
            border-radius: 3px;
        }

        .menu-close::before {
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .menu-close::after {
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        .menu-content {
            position: relative;
            z-index: 10;
            text-align: center;
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.2s;
            margin-top: 100px;
        }

        .menu-overlay.active .menu-content {
            transform: scale(1);
            opacity: 1;
        }

        .menu-section {
            margin-bottom: 50px;
        }

        .menu-section:last-child {
            margin-bottom: 0;
        }

        .menu-list {
            list-style: none;
            padding: 0;
        }

        .menu-list li {
            margin: 20px 0;
            transform: translateX(-50px);
            opacity: 0;
            transition: all 0.4s ease;
        }

        .menu-overlay.active .menu-list li {
            transform: translateX(0);
            opacity: 1;
        }

        .menu-overlay.active .menu-list li:nth-child(1) { transition-delay: 0.3s; }
        .menu-overlay.active .menu-list li:nth-child(2) { transition-delay: 0.4s; }
        .menu-overlay.active .menu-list li:nth-child(3) { transition-delay: 0.5s; }
        .menu-overlay.active .menu-list li:nth-child(4) { transition-delay: 0.6s; }
        .menu-overlay.active .menu-list li:nth-child(5) { transition-delay: 0.7s; }

        .menu-list a {
            color: #3d2f1f;
            text-decoration: none;
            font-size: 32px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            display: inline-block;
            padding: 10px 20px;
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
        }

        .menu-list a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: #3d2f1f;
            transform: translateX(-50%);
            transition: width 0.3s ease;
        }

        .menu-list a:hover::before {
            width: 80%;
        }

        .menu-list a:hover {
            transform: scale(1.1);
            color: #2d1f0f;
        }

        .menu-divider {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #3d2f1f, transparent);
            margin: 40px auto;
            opacity: 0;
            transform: scaleX(0);
            transition: all 0.6s ease 0.8s;
        }

        .menu-overlay.active .menu-divider {
            opacity: 1;
            transform: scaleX(1);
        }

        .menu-section.secondary .menu-list a {
            font-size: 24px;
            color: #3d2f1f;
        }

        .menu-section.account {
            margin-top: 60px;
        }

        .menu-section.account .menu-list a {
            font-size: 20px;
            color: #3d2f1f;
        }

        /* قسم المنتجات */
        .products-section {
            position: relative;
            z-index: 10;
            padding: 150px 5% 80px 5%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px 40px;
            max-width: 1000px;
            width: 100%;
        }

        .product-card {
            background: transparent;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-10px);
        }

        .product-image-container {
            width: 100%;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .product-image-container img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .product-name {
            font-size: 28px;
            font-weight: 700;
            color: #3d2f1f;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Cinzel', serif;
        }

        .explore-btn {
            display: inline-block;
            padding: 14px 35px;
            background-color: #3d2f1f;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            border: 2px solid #3d2f1f;
            font-family: 'Cinzel', serif;
        }

        .explore-btn:hover {
            background-color: transparent;
            color: #3d2f1f;
        }

        /* الفوتر */
        .footer-container {
            position: relative;
            bottom: 0;
            left: 0;
            width: 100%;
            height: auto;
            z-index: 1000;
            margin-top: 80px;
            display: block;
            line-height: 0;
        }

        .footer-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* تصميم متجاوب إضافي */
        @media (max-width: 1024px) {
            .products-grid {
                gap: 50px 30px;
                max-width: 800px;
            }

            .product-image-container {
                height: 300px;
            }

            .product-name {
                font-size: 24px;
            }
        }

        @media (max-width: 768px) {
            .logo-container {
                width: 120px;
            }
            
            .navbar {
                padding: 20px 5%;
            }

            .menu-icon span {
                width: 30px;
                height: 2.5px;
            }

            .menu-logo {
                width: 120px;
            }

            .menu-close {
                width: 35px;
                height: 35px;
            }

            .menu-close::before,
            .menu-close::after {
                width: 25px;
            }

            .menu-list a {
                font-size: 24px;
            }

            .menu-section.secondary .menu-list a {
                font-size: 18px;
            }

            .menu-section.account .menu-list a {
                font-size: 16px;
            }

            .menu-section {
                margin-bottom: 35px;
            }

            .menu-section.account {
                margin-top: 40px;
            }

            .menu-header {
                padding: 20px 5%;
            }

            .products-section {
                padding: 120px 5% 60px 5%;
            }

            .products-grid {
                gap: 40px 20px;
                max-width: 600px;
            }

            .product-image-container {
                height: 250px;
            }

            .product-name {
                font-size: 20px;
                margin-bottom: 15px;
            }

            .explore-btn {
                padding: 12px 28px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .products-grid {
                gap: 35px 15px;
            }

            .product-image-container {
                height: 200px;
            }

            .product-name {
                font-size: 18px;
            }

            .explore-btn {
                padding: 10px 24px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <!-- الخلفية -->
    <div class="background-container"></div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <!-- شريط التنقل -->
        <nav class="navbar">
            <div class="logo-container">
                <img src="L11.png" alt="Logo">
            </div>
            <div class="menu-icon" id="menuIcon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>

        <!-- قائمة المنيو -->
        <div class="menu-overlay" id="menuOverlay">
            <!-- هيدر المنيو -->
            <div class="menu-header">
                <div class="menu-close" id="menuClose"></div>
                <div class="menu-logo">
                    <img src="L11.png" alt="Logo">
                </div>
            </div>

            <div class="menu-content">
                <!-- القسم الرئيسي -->
                <div class="menu-section">
                    <ul class="menu-list">
                        <li><a href="#home">Home</a></li>
                        <li><a href="#products">Products</a></li>
                        <li><a href="#cart">Shopping Cart</a></li>
                    </ul>
                </div>

                <div class="menu-divider"></div>

                <!-- القسم الثانوي -->
                <div class="menu-section secondary">
                    <ul class="menu-list">
                        <li><a href="#privacy">Privacy Policy</a></li>
                        <li><a href="#returns">Return Policy</a></li>
                        <li><a href="#about">About Store</a></li>
                    </ul>
                </div>

                <div class="menu-divider"></div>

                <!-- قسم الحساب -->
                <div class="menu-section account">
                    <ul class="menu-list">
                        <li><a href="#account">My Account</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- قسم المنتجات -->
        <section class="products-section">
            <div class="products-grid">
                <!-- المنتج الأول -->
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="P1.png" alt="Hattan 1">
                    </div>
                    <h3 class="product-name">HATTAN 1</h3>
                    <a href="javascript:void(0)" class="explore-btn">EXPLORE MORE</a>
                </div>

                <!-- المنتج الثاني -->
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="P2.png" alt="Hattan 2">
                    </div>
                    <h3 class="product-name">HATTAN 2</h3>
                    <a href="javascript:void(0)" class="explore-btn">EXPLORE MORE</a>
                </div>

                <!-- المنتج الثالث -->
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="P3.png" alt="Ghada">
                    </div>
                    <h3 class="product-name">GHADA</h3>
                    <a href="javascript:void(0)" class="explore-btn">EXPLORE MORE</a>
                </div>

                <!-- المنتج الرابع -->
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="P4.png" alt="Bareq">
                    </div>
                    <h3 class="product-name">BAREQ</h3>
                    <a href="javascript:void(0)" class="explore-btn">EXPLORE MORE</a>
                </div>
            </div>
        </section>

        <!-- الفوتر -->
        <footer class="footer-container">
            <img src="F1.png" alt="Footer">
        </footer>
    </div>

    <script>
        // فتح وإغلاق المنيو
        const menuIcon = document.getElementById('menuIcon');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuClose = document.getElementById('menuClose');

        function toggleMenu() {
            menuIcon.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            
            // منع السكرول عند فتح المنيو
            if (menuOverlay.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        }

        // فتح المنيو من الأيقونة
        menuIcon.addEventListener('click', toggleMenu);

        // إغلاق المنيو من علامة X
        menuClose.addEventListener('click', function() {
            menuIcon.classList.remove('active');
            menuOverlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        });

        // إغلاق المنيو عند الضغط على أي رابط
        const menuLinks = document.querySelectorAll('.menu-list a');
        menuLinks.forEach(link => {
            link.addEventListener('click', function() {
                menuIcon.classList.remove('active');
                menuOverlay.classList.remove('active');
                document.body.style.overflow = 'auto';
            });
        });

        // إغلاق المنيو عند الضغط على الخلفية
        menuOverlay.addEventListener('click', function(e) {
            if (e.target === menuOverlay) {
                menuIcon.classList.remove('active');
                menuOverlay.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });
    </script>
</body>
</html>
